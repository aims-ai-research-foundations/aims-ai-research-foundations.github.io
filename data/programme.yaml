  - { n: "3", label: "Empower", icon: "school", body: "Lecturers deliver engaging, practical AI learning at their universities." }
  - { n: "4", label: "Impact", icon: "groups", body: "Thousands of students gain the skills to build and innovate with AI." }

programmeSummary: "AI Research Foundations for Higher Education helps universities build lasting, in-house AI teaching capacity. Funded by Google.org and built on a curriculum from Google DeepMind, the programme trains lecturers at 30 universities across Nigeria, Ghana, Kenya, and South Africa to deliver eight hands-on AI courses, adapted for their own students and context."

quoteBanner:
  quote: "In Africa's youth lies the future of global innovation"
  body: "By equipping our universities today, we ensure that the next generation of Artificial Intelligence is not just used in Africa, but defined, designed, and deployed by African minds."
  image: "img/landing/see-you-in-muizenberg.jpg"

