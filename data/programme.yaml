tagline: "Empowering Universities to Lead Africa's AI Future"
subline: "A Train-the-Trainer programme, funded by Google.org, that equips university lecturers across Africa to teach a localised version of Google DeepMind's AI Research Foundations curriculum."

vision: "A future where universities across Africa have the expertise, curriculum, and confidence to educate the next generation of AI researchers, innovators, and leaders."
mission: "Train university lecturers to teach an advanced, hands-on AI curriculum with confidence, so that thousands of students across Africa can build and apply modern AI."
approach: "We use a Train-the-Trainer model. Instead of teaching students directly, we upskill the lecturers who already teach them. Each university nominates its AI Champions, who carry the skills back to their own classrooms."

visionHeadline: "African universities leading the future of AI"

