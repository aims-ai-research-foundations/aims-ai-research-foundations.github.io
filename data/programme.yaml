trainTheTrainer:
  eyebrow: "How it works"
  title: "Train one lecturer. Reach hundreds of students."
  intro: "We do not teach students directly. We train their lecturers. Each lecturer we train goes on to teach the courses to their own classes, year after year. That is how a small team reaches thousands of students across Africa."
  steps:
    - { icon: "people", count: "8", unit: "experts", label: "We train the lecturers", detail: "Lecturers complete the curriculum and an intensive in-person workshop, with support throughout." }
    - { icon: "school", count: "150+", unit: "AI Champions", label: "They teach their students", detail: "Each lecturer delivers the courses to their own classes, adapted for local context." }
    - { icon: "groups", count: "Thousands", unit: "of students", label: "The skills multiply", detail: "Across 30 universities and 4 countries, every new cohort of students builds on the last." }

whyMatters:
  - audience: "What students ask for"
    icon: "lightbulb"
    body: "Students want to work on real, modern AI: language models, neural networks, and transformers, with the maths and code behind them. They want skills that lead to research and jobs, taught by people who understand their context."
  - audience: "What lecturers ask for"
    icon: "school"
    body: "Lecturers want to teach AI with confidence, using ready-made, high-quality materials they can adapt. They want hands-on experience, a community of peers, and the freedom to localise examples for their own students."

