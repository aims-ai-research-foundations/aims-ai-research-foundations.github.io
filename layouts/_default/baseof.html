<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
  {{- partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  {{- partial "header.html" . }}
  <main id="main">
    {{- block "main" . }}{{- end }}
  </main>
  {{- partial "footer.html" . }}
  {{- $js := resources.Get "js/site.js" | fingerprint }}
  <script src="{{ $js.RelPermalink }}" defer></script>
</body>
</html>
